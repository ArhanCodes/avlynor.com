<!--
  Approximation of the Avlynor monogram. Replace this file with the
  real logo (PNG or SVG) by dropping it here with the same filename,
  then rebuild. The site references this file by path, so swapping
  is enough.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer thin circle -->
  <circle cx="100" cy="100" r="78" stroke="#D4B572" stroke-width="1.4"/>

  <!-- 4-point sparkle at top of circle -->
  <g transform="translate(100,22)">
    <path d="M0 -9 L1.3 -1.3 L9 0 L1.3 1.3 L0 9 L-1.3 1.3 L-9 0 L-1.3 -1.3 Z" fill="#D4B572"/>
  </g>

  <!-- A monogram: clean triangular A, legs to lower corners -->
  <path d="M 56 162 L 100 48 L 144 162" stroke="#D4B572" stroke-width="2.2" fill="none"/>

  <!-- Inner N nested inside the A (left vertical, diagonal, right vertical) -->
  <path d="M 80 162 L 80 90 L 120 162 L 120 90" stroke="#D4B572" stroke-width="1.5" fill="none"/>

  <!-- Crossbar of A -->
  <path d="M 78 124 L 122 124" stroke="#D4B572" stroke-width="1.3"/>

  <!-- Curved arc at the base -->
  <path d="M 38 162 Q 100 190 162 162" stroke="#D4B572" stroke-width="1.6" fill="none"/>

  <!-- Small dot below the arc -->
  <circle cx="100" cy="174" r="2.2" fill="#D4B572"/>
</svg>
